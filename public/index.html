<!DOCTYPE html>
<html>
<head>
  <title>Notat & Todo</title>
  <link rel="stylesheet" href="style.css">
</head>

<body>

  <h1>Notat og Todo</h1>

  <div>
    <h2>Notater</h2>
    <input id="noteTitle" placeholder="Tittel">
    <textarea id="noteContent" placeholder="Innhold"></textarea>
    <button onclick="addNote()">Lagre notat</button>
    <ul id="notesList"></ul>
  </div>

  <div id="todo-form">
    <input type="text" id="todoTitle" placeholder="Tittel (f.eks. Handleliste)">
    <br><br>
    <input type="text" id="todoTaskInput" placeholder="Ny oppgave...">
    <button onclick="addTaskToList()">Legg til oppgave</button>
    
    <ul id="tempTasksList"></ul> <button onclick="addTodo()" style="background-color: #4CAF50; color: white;">Lagre hele To-Do listen</button>
</div>

<hr>
<ul id="todosList"></ul>

  <script src="script.js"></script>

</body>
</html>
